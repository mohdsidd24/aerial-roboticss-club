<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aerial Robotics Club</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c10;

    --bg3: #111820;
    --accent: #00d4ff;
    --accent2: #ff4d00;

    --text: #e8edf2;
    --muted: #6b7a8d;
    --border: rgba(0,212,255,0.15);

    --grid: rgba(0,212,255,0.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 16px; line-height: 1.6; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 60px 60px; pointer-events:none; z-index:0; }
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 4vw; height:64px; background: rgba(8,12,16,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border2); }
  .nav-logo { font-family:'Orbitron',monospace; font-size:14px; font-weight:700; letter-spacing:0.15em; color:var(--accent); text-decoration:none; }
  .nav-links { display:flex; gap:2rem; list-style:none; }
  .nav-links a { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-links a:hover { color:var(--accent); }
  .nav-cta { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--bg); background:var(--accent); padding:8px 20px; border:none; cursor:pointer; text-decoration:none; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); transition: background 0.2s, color 0.2s; }
  .nav-cta:hover { background:#fff; }
  section { position:relative; z-index:1; }
  #hero { min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 100px 4vw 80px; text-align:center; overflow:hidden; }
  .hero-inner { max-width:900px; }
  .hero-tag { display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); border:1px solid var(--border); padding:6px 16px; margin-bottom:2rem; }
  .hero-tag::before { content:''; width:6px; height:6px; background:var(--accent); border-radius:50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  h1 { font-family:'Orbitron',monospace; font-size: clamp(2.5rem, 8vw, 6rem); font-weight:900; line-height:1; letter-spacing:-0.02em; margin-bottom:1.5rem; }
  h1 span { display:block; background: linear-gradient(135deg, var(--accent) 0%, #7b6fff 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hero-sub { font-size:1.1rem; font-weight:300; color:var(--muted); max-width:600px; margin:0 auto 2.5rem; line-height:1.8; }
  .hero-tags { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:2.5rem; }
  .tag { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); border:1px solid var(--border); padding:5px 14px; background:rgba(0,212,255,0.04); }
  .hero-btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  .btn-primary { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--bg); background:var(--accent); padding:14px 32px; border:none; cursor:pointer; text-decoration:none; display:inline-block; clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%); transition: all 0.2s; }
  .btn-primary:hover { background:#fff; transform:translateY(-2px); }
  .btn-secondary { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); padding:14px 32px; border:1px solid var(--border); background:transparent; cursor:pointer; text-decoration:none; display:inline-block; transition:all 0.2s; }
  .btn-secondary:hover { background:rgba(0,212,255,0.06); transform:translateY(-2px); }
  .drone-graphic { margin:3rem auto 0; width:100%; max-width:700px; opacity:0.7; }
  .section-wrap { padding:100px 4vw; max-width:1200px; margin:0 auto; }
  .section-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent2); margin-bottom:0.5rem; }
  .section-title { font-family:'Orbitron',monospace; font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight:700; line-height:1.1; margin-bottom:1rem; }
  .section-desc { color:var(--muted); font-weight:300; max-width:560px; font-size:1rem; line-height:1.8; margin-bottom:3rem; }
  .divider { border:none; border-top:1px solid var(--border2); margin:0; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:1px; background:var(--border2); border:1px solid var(--border2); margin-bottom:4rem; }
  .stat { background:var(--bg2); padding:2rem 1.5rem; text-align:center; }
  .stat-num { font-family:'Orbitron',monospace; font-size:2.2rem; font-weight:900; color:var(--accent); display:block; margin-bottom:4px; }
